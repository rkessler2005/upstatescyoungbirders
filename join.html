<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join | Upstate SC Young Birders</title>

  <style>

    :root {
      --forest: #254734;
      --cream: #f7f3ea;
      --teal: #5d8fb3;
      --ink: #1f2a24;
      --paper: #fffdf9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: Georgia, serif;
      line-height: 1.7;
    }

    nav {
      padding: .8rem 6vw;
      background: rgba(247,243,234,.92);
      border-bottom: 1px solid rgba(37,71,52,.1);

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav img {
      height: 58px;
    }

    nav a {
      color: var(--forest);
      text-decoration: none;
      margin-left: 1rem;

      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .75rem;
    }

    header {
      min-height: 70vh;

      background:
        linear-gradient(rgba(247,243,234,.72), rgba(247,243,234,.92)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2000&auto=format&fit=crop")
        center/cover;

      display: flex;
      align-items: end;

      padding: 6rem 8vw 4rem;
    }

    .hero {
      max-width: 620px;
    }

    h1 {
      color: var(--forest);
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 1rem;
    }

    .small-label {
      font-family: Arial, sans-serif;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .75rem;
      margin-bottom: .75rem;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .card {
      background: rgba(255,255,255,.72);

      backdrop-filter: blur(6px);

      padding: 2rem;

      border-radius: 1rem;

      border: 1px solid rgba(37,71,52,.1);

      margin-bottom: 2rem;
    }

    h2 {
      color: var(--forest);
      font-weight: 400;
      margin-bottom: 1rem;
    }

    iframe {
      width: 100%;
      height: 850px;
      border: none;
      border-radius: 1rem;
      background: white;
    }

    footer {
      background: var(--forest);
      color: white;

      padding: 2rem 8vw;

      font-family: Arial, sans-serif;
      font-size: .85rem;
    }

  </style>
</head>

<body>

<nav>

  <a href="index.html">
    <img src="logo.png" alt="Club Logo">
  </a>

  <div>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
  </div>

</nav>

<header>

  <div class="hero">

    <p class="small-label">Join</p>

    <h1>New birders are welcome.</h1>

    <p>
      Bird walks, photography, and conservation focused outings around the Upstate.
    </p>

  </div>

</header>

<main>

  <div class="card">

    <h2>Interest Form</h2>

    <p>
      Open to ages 10–18.
      Participants under 14 must be accompanied by an adult.
    </p>

  </div>

  <div class="card">

    <iframe src="PASTE_GOOGLE_FORM_EMBED_LINK_HERE">
      Loading…
    </iframe>

  </div>

</main>

<footer>

  <p>upstatesc.youngbirders@gmail.com</p>

</footer>

</body>
</html>
