<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Join | Upstate SC Young Birders</title>

<style>
:root{
  --forest:#254734;
  --moss:#6f8f72;
  --sage:#dfe8d8;
  --cream:#f7f3ea;
  --ink:#1f2a22;
  --soft:#edf2ea;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Georgia, serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.7;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 7vw;
  background:rgba(247,243,234,.92);
  position:sticky;
  top:0;
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(37,71,52,.08);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  width:46px;
}

.logo span{
  font-size:.95rem;
  color:var(--forest);
  letter-spacing:.04em;
}

nav ul{
  display:flex;
  gap:1.5rem;
  list-style:none;
}

nav a{
  text-decoration:none;
  color:var(--forest);
  font-size:.92rem;
}

.hero{
  padding:5rem 7vw 3rem;
  max-width:760px;
}

.small{
  color:var(--moss);
  text-transform:uppercase;
  letter-spacing:.15em;
  font-size:.72rem;
  margin-bottom:1rem;
}

h1{
  font-size:2.4rem;
  font-weight:normal;
  color:var(--forest);
  margin-bottom:1rem;
}

.hero p{
  max-width:620px;
}

.form-wrap{
  padding:0 7vw 5rem;
}

iframe{
  width:100%;
  min-height:1400px;
  border:none;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

footer{
  padding:2rem 7vw;
  border-top:1px solid rgba(0,0,0,.06);
  font-size:.9rem;
  color:#5e6d63;
}

@media(max-width:700px){

  nav{
    flex-direction:column;
    gap:1rem;
  }

  nav ul{
    gap:1rem;
    flex-wrap:wrap;
    justify-content:center;
  }

  h1{
    font-size:2rem;
  }

}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png">
    <span>Upstate SC Young Birders</span>
  </div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <p class="small">Join</p>

  <h1>Interest Form</h1>

  <p>
    Thanks for your interest in the club.
    We welcome beginners, photographers, birders,
    and anyone wanting to spend more time outdoors
    around the Upstate.
  </p>
</section>

<section class="form-wrap">

<iframe 
src="https://docs.google.com/forms/d/e/1FAIpQLSdbblmFLZhS5wrUIRrWkQCGxF6soqNOhHrttPdlwmAcRrkMAw/viewform?embedded=true">
Loading…
</iframe>

</section>

<footer>
  upstatesc.youngbirders@gmail.com
</footer>

</body>
</html>
